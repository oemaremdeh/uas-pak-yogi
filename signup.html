<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartLomba – Registrasi Akun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body class="login-body">

  <div class="login-wrapper">
    <!-- Left Panel -->
    <div class="login-left">
      <div class="login-left-content">
        <div class="login-logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="64" height="64">
            <path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
          </svg>
        </div>
        <h1 class="login-brand">SmartLomba</h1>
        <p class="login-tagline">Portal Administrasi Kompetisi<br/>Akademik Nasional</p>
        <div class="login-decorations">
          <span class="dec-circle dec-1"></span>
          <span class="dec-circle dec-2"></span>
          <span class="dec-circle dec-3"></span>
        </div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="login-right">
      <div class="login-form-container" style="max-width:460px;">
        <h2 class="login-welcome">Buat Akun Peserta</h2>
        <p class="login-sub">Lengkapi data diri untuk mendaftar sebagai peserta.</p>

        <form id="signupForm" onsubmit="handleSignup(event)">
          <div class="form-group">
            <label class="form-label">Nama Lengkap</label>
            <input type="text" id="regNama" class="form-input" placeholder="Nama Lengkap" required />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">NISN (10 Digit)</label>
              <input type="text" id="regNisn" class="form-input" placeholder="0012345678" maxlength="10" pattern="\d{10}" required />
            </div>
            <div class="form-group">
              <label class="form-label">Asal Sekolah</label>
              <input type="text" id="regSekolah" class="form-input" placeholder="SMA Negeri 1" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Jenjang</label>
              <select id="regJenjang" class="form-select" required>
                <option value="">Pilih Jenjang</option>
                <option>SD</option>
                <option>SMP</option>
                <option>SMA/SMK</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Kelas</label>
              <input type="text" id="regKelas" class="form-input" placeholder="XI MIPA 2" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Alamat Email</label>
              <input type="email" id="regEmail" class="form-input" placeholder="email@contoh.com" required />
            </div>
            <div class="form-group">
              <label class="form-label">No. HP Orang Tua</label>
              <input type="tel" id="regHp" class="form-input" placeholder="08xxxxxxxxxx" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Password</label>
              <input type="password" id="regPassword" class="form-input" placeholder="Min. 8 karakter" minlength="8" required />
            </div>
            <div class="form-group">
              <label class="form-label">Konfirmasi Password</label>
              <input type="password" id="regPasswordConfirm" class="form-input" placeholder="Ulangi password" required />
            </div>
          </div>

          <div id="signupError" class="login-error" style="display:none;"></div>
          <div id="signupSuccess" class="login-error" style="display:none; color:var(--green);"></div>

          <button type="submit" class="btn-primary btn-full" id="signupBtn" style="margin-top:8px;">Daftar Sekarang</button>
        </form>

        <p style="text-align:center; margin-top:20px; font-size:13px; color:var(--text-gray);">
          Sudah punya akun? <a href="index.html">Masuk di sini</a>
        </p>

        <div class="login-footer">
          <span>&copy; SmartLomba 2025</span>
          <span>&bull;</span>
          <span>Official Portal</span>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
