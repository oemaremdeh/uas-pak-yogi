<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartLomba – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body class="login-body">

  <div class="login-wrapper">
    <!-- Left Panel -->
    <div class="login-left">
      <div class="login-left-content">
        <div class="login-logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="64" height="64">
            <path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/>
          </svg>
        </div>
        <h1 class="login-brand">SmartLomba</h1>
        <p class="login-tagline">Portal Administrasi Kompetansi<br/>Akademik Nasional</p>

        <div class="login-decorations">
          <span class="dec-circle dec-1"></span>
          <span class="dec-circle dec-2"></span>
          <span class="dec-circle dec-3"></span>
        </div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="login-right">
      <div class="login-form-container">
        <h2 class="login-welcome">Selamat Datang</h2>
        <p class="login-sub">Silakan masuk ke akun administrator Anda.</p>

        <!-- Toggle Tabs -->
        <div class="login-tabs" id="loginTabs">
          <button class="tab-btn active" data-tab="admin" onclick="switchTab('admin')">Admin</button>
          <button class="tab-btn" data-tab="peserta" onclick="switchTab('peserta')">Peserta</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <input type="text" id="loginEmail" class="form-input" placeholder="Email atau Username" />
          </div>
          <div class="form-group" style="position:relative;">
            <input type="password" id="loginPassword" class="form-input" placeholder="Kata Sandi" />
            <button type="button" class="pw-toggle" onclick="togglePassword()" title="Tampilkan/Sembunyikan">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="form-row-between">
            <label class="checkbox-label">
              <input type="checkbox" id="rememberMe" /> Ingat Saya
            </label>
            <a href="#" class="link-forgot">Lupa Kata Sandi?</a>
          </div>
          <div id="loginError" class="login-error" style="display:none;">Email atau password salah. Coba lagi.</div>
          <button type="submit" class="btn-primary btn-full" id="loginBtn">Masuk Sekarang</button>
        </form>

        <p style="text-align:center; margin-top:20px; font-size:13px; color:var(--text-gray);">
          Belum punya akun? <a href="signup.html">Daftar di sini</a>
        </p>

        <div class="login-footer">
          <span>&copy; SmartLomba 2025</span>
          <span>&bull;</span>
          <span>Official Portal</span>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
